<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zettelkasten Notes</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        Zettelkasten Notes
    </header>

    <div class="container">
        <aside class="sidebar">
            <button class="plus-circle" aria-label="Add new note">+</button>
        </aside>

        <section class="hero">
            <h1>Welcome</h1>
            
            <input type="text" id="searchInput" placeholder="Search cards..." aria-label="Search notes" />
            
            <div class="card-container" id="card-container"></div>

            <div class="editor hidden" id="editor" role="dialog" aria-modal="true">
                
                <div class="editor-header">
                    <h2 id="editor-title" contenteditable="true" aria-label="Note title"></h2>
                    <button id="close-editor" aria-label="Close editor">✕</button>
                </div>
                
                <div class="editor-divider"></div>

                <div class="ai-toolbar">
                    <input 
                        type="text" 
                        id="ai-prompt-input"
                        class="ai-input"
                        list="ai-suggestions"
                        placeholder="Try: study notes, flashcards, keywords, summary..."
                    />
                
                    <datalist id="ai-suggestions">
                        <option value="study notes">
                        <option value="summary">
                        <option value="keywords">
                        <option value="flashcards">
                        <option value="bullet points">
                        <option value="exam preparation">
                        <option value="extract key concepts">
                        <option value="important points only">
                        <option value="format for revision">
                        <option value="add practical examples">
                    </datalist>
                
                    <button id="ai-generate-btn" class="ai-btn">
                        ✨ Magic Edit
                    </button>
                </div>
                
                <textarea id="editor-content" placeholder="Enter details here..." aria-label="Note content"></textarea>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 Nilesh217. All Rights Reserved.</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
